<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#6c7cff">
  <title>Loading... Arena Leaderboard</title>
  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="stylesheet" href="/pwa/static/css/pwa.css">
  <script src="/pwa/static/js/pwa.js" defer></script>
</head>
<body class="pwa-app-shell">
  <main class="pwa-screen">
    <header class="pwa-top-bar">
      <a class="pwa-logo-link" href="/pwa">Loading...</a>
      <span class="pwa-top-pill">Weekly</span>
    </header>

    <section class="pwa-list-panel">
      <p class="pwa-eyebrow">Leaderboard</p>
      <h1>This week&apos;s strongest closers.</h1>
      <div class="pwa-rank-card pwa-rank-winner">
        <span>#1</span><strong>Maya Chen</strong><em>96 audience score</em>
      </div>
      <div class="pwa-rank-card">
        <span>Highest buy vote</span><strong>Jordan Lee</strong><em>89% buy votes</em>
      </div>
      <div class="pwa-rank-card">
        <span>Most beaten pitch</span><strong>Smart water bottle</strong><em>214 challengers</em>
      </div>
      <div class="pwa-rank-card">
        <span>Best closer</span><strong>Niko Patel</strong><em>Top final 10 seconds</em>
      </div>
    </section>
  </main>

  <nav class="pwa-bottom-nav" aria-label="Arena navigation">
    <a class="pwa-nav-item" href="/pwa">Home</a>
    <a class="pwa-nav-item" href="/pwa/feed">Feed</a>
    <a class="pwa-nav-item pwa-nav-record" href="/pwa/record">Record</a>
    <a class="pwa-nav-item pwa-nav-active" href="/pwa/leaderboard">Leaders</a>
    <a class="pwa-nav-item" href="/pwa/profile">Profile</a>
  </nav>
</body>
</html>
