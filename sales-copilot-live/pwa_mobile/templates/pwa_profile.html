<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#6c7cff">
  <title>Loading... Arena Profile</title>
  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="stylesheet" href="/pwa/static/css/pwa.css">
  <script src="/pwa/static/js/pwa.js" defer></script>
</head>
<body class="pwa-app-shell">
  <main class="pwa-screen">
    <header class="pwa-top-bar">
      <a class="pwa-logo-link" href="/pwa">Loading...</a>
      <span class="pwa-top-pill">Profile</span>
    </header>

    <section class="pwa-profile-panel">
      <div class="pwa-avatar">NV</div>
      <h1>Nikhil V.</h1>
      <p>Pitching practical products with clean closes.</p>
      <div class="pwa-profile-stats">
        <div><strong>18</strong><span>Total pitches</span></div>
        <div><strong>84</strong><span>Avg score</span></div>
        <div><strong>1.2k</strong><span>Followers</span></div>
      </div>
      <div class="pwa-badge-row">
        <span>Best Closer</span>
        <span>Top 10</span>
        <span>Hydration Champ</span>
      </div>
      <section class="pwa-saved-panel">
        <h2>Saved pitches</h2>
        <article>Smart water bottle close</article>
        <article>Desk treadmill objection handle</article>
      </section>
    </section>
  </main>

  <nav class="pwa-bottom-nav" aria-label="Arena navigation">
    <a class="pwa-nav-item" href="/pwa">Home</a>
    <a class="pwa-nav-item" href="/pwa/feed">Feed</a>
    <a class="pwa-nav-item pwa-nav-record" href="/pwa/record">Record</a>
    <a class="pwa-nav-item" href="/pwa/leaderboard">Leaders</a>
    <a class="pwa-nav-item pwa-nav-active" href="/pwa/profile">Profile</a>
  </nav>
</body>
</html>
