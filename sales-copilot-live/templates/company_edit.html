<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Edit Company | Loading...</title><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head>
<body class="workspace-body">
  <header class="workspace-topbar"><a class="brand-mark" href="/">Loading...</a><nav class="workspace-tabs"><a href="/dashboard">Dashboard</a><a class="active" href="/companies">Companies</a><a href="/meetings">Meetings</a><a href="/notes">Notes</a></nav></header>
  <main class="workspace-shell narrow">
    <section class="workspace-page-title"><span class="pill-label">Edit client</span><h1>{{ company.company_name }}</h1><p>Keep account context fresh before the next live call.</p></section>
    <form class="app-panel form-grid" method="post">
      <label>Company / Client Name<input name="company_name" value="{{ company.company_name }}" required></label>
      <label>Project Name<input name="project_name" value="{{ company.project_name or '' }}"></label>
      <label>Contact Name<input name="contact_name" value="{{ company.contact_name or '' }}"></label>
      <label>Contact Email<input name="contact_email" type="email" value="{{ company.contact_email or '' }}"></label>
      <label>Contact Phone<input name="contact_phone" value="{{ company.contact_phone or '' }}"></label>
      <label>Website<input name="website" value="{{ company.website or '' }}"></label>
      <label>Deal Stage<select name="deal_stage">{% for stage in ["New Lead","Discovery","Demo Scheduled","Proposal Sent","Negotiation","Closed Won","Closed Lost"] %}<option {% if company.deal_stage == stage %}selected{% endif %}>{{ stage }}</option>{% endfor %}</select></label>
      <label>Priority<select name="priority">{% for priority in ["Low","Medium","High"] %}<option {% if company.priority == priority %}selected{% endif %}>{{ priority }}</option>{% endfor %}</select></label>
      <label>Status<select name="status">{% for status in ["Active","Follow-up Needed","Meeting Scheduled","Closed","Paused"] %}<option {% if company.status == status %}selected{% endif %}>{{ status }}</option>{% endfor %}</select></label>
      <label>Product or service being sold<input name="product_or_service" value="{{ company.product_or_service or '' }}"></label>
      <label class="span-2">Pain points if known<textarea name="pain_points">{{ company.pain_points or '' }}</textarea></label>
      <label class="span-2">Notes / Context<textarea name="notes">{{ company.notes or '' }}</textarea></label>
      <button class="mac-cta span-2" type="submit">Save Changes</button>
    </form>
  </main>
</body>
</html>
