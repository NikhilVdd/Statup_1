<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up | Loading...</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
  <div class="auth-sky">
    <div class="sun-glow"></div>
    <div class="auth-card glass-card">
      <a class="brand-mark" href="/">Loading...</a>
      <h1>Create your workspace</h1>
      <p>Start the web demo and see the live sales teleprompter in action.</p>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}
      <form method="post" class="auth-form">
        <label>Name<input name="name" autocomplete="name" required></label>
        <label>Email<input name="email" type="email" autocomplete="email" required></label>
        <label>Password<input name="password" type="password" minlength="6" autocomplete="new-password" required></label>
        <button class="mac-cta full" type="submit">Enter app</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
    </div>
  </div>
</body>
</html>
